name: Test Project

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  initial:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: ./test-project
        run: npm ci

      - name: Lint code
        working-directory: ./test-project
        run: npm run lint

      - name: Test code
        working-directory: ./test-project
        run: npm run test

  build:
    needs: initial
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: ./test-project
        run: npm ci

      - name: Build code
        working-directory: ./test-project
        run: npm run build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
      - name: List artifacts
        run: ls
      - name: Deploy code
        run: echo "Deploying..."
